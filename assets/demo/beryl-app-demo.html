<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Béryl App Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; overflow: hidden; }
#root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  obsidian: "#0A0A0F",
  emerald: "#014421",
  accent: "#00C46A",
  accentDim: "#00A856",
  gold: "#D4AF37",
  white: "#FFFFFF",
  grayLt: "#E8F1ED",
  gray: "#8A9A8F",
  surface: "#111816",
  surfaceHi: "#1A2820",
  red: "#E74C3C",
  blue: "#3498DB",
  orange: "#E67E22",
};

const SCREENS = ["splash", "home", "community", "chat", "pay", "mobility", "esg"];

const DEMO_STEPS = [
  { screen: "splash", duration: 2000 },
  { screen: "home", duration: 2800 },
  { screen: "community", duration: 2500 },
  { screen: "chat", duration: 3000 },
  { screen: "pay", duration: 3000 },
  { screen: "mobility", duration: 2800 },
  { screen: "esg", duration: 2500 },
  { screen: "home", duration: 2000 },
];

const time = () => new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });

function PhoneFrame({ children }) {
  return (
    <div style={{
      width: "100%", height: "100%",
      background: C.obsidian,
      overflow: "hidden",
      position: "relative",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
    }}>
      <div style={{
        height: 36, background: "rgba(0,0,0,0.4)",
        display: "flex", alignItems: "center",
        justifyContent: "space-between",
        padding: "0 20px", zIndex: 100,
        position: "absolute", top: 0, left: 0, right: 0,
      }}>
        <span style={{ fontSize: 11, color: C.white, fontWeight: 600 }}>{time()}</span>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          <div style={{ display: "flex", gap: 2, alignItems: "flex-end" }}>
            {[3,5,7,9].map((h, i) => (
              <div key={i} style={{ width: 3, height: h, background: C.white, borderRadius: 1 }} />
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 1 }}>
            <div style={{ width: 18, height: 10, border: `1.5px solid ${C.white}`, borderRadius: 2,
              display: "flex", alignItems: "center", padding: "1px" }}>
              <div style={{ width: "75%", height: "100%", background: C.accent, borderRadius: 1 }} />
            </div>
            <div style={{ width: 2, height: 5, background: C.white, borderRadius: 1 }} />
          </div>
        </div>
      </div>
      {children}
    </div>
  );
}

function NavBar({ active, onNav }) {
  const tabs = [
    { id: "home", icon: "⊞", label: "Accueil" },
    { id: "community", icon: "💬", label: "Community" },
    { id: "pay", icon: "₣", label: "Pay" },
    { id: "mobility", icon: "⚡", label: "Mobilité" },
    { id: "esg", icon: "🌿", label: "ESG" },
  ];
  return (
    <div style={{
      position: "absolute", bottom: 0, left: 0, right: 0, height: 68,
      background: "rgba(10,10,15,0.97)",
      borderTop: `1px solid ${C.surfaceHi}`,
      display: "flex", alignItems: "center", justifyContent: "space-around",
      backdropFilter: "blur(20px)",
      padding: "0 4px 6px",
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onNav(t.id)} style={{
          background: "none", border: "none", cursor: "pointer",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          padding: "6px 8px",
        }}>
          <span style={{ fontSize: 20 }}>{t.icon}</span>
          <span style={{
            fontSize: 9, fontWeight: 600, letterSpacing: 0.3,
            color: active === t.id ? C.accent : C.gray,
          }}>{t.label}</span>
          {active === t.id && (
            <div style={{ width: 20, height: 2, background: C.accent, borderRadius: 1, marginTop: -2 }} />
          )}
        </button>
      ))}
    </div>
  );
}

function SplashScreen() {
  const [show, setShow] = useState(false);
  useEffect(() => { const t = setTimeout(() => setShow(true), 300); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: "absolute", inset: 0,
      background: `radial-gradient(ellipse at 50% 60%, #014421 0%, #011A0D 50%, #0A0A0F 100%)`,
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      gap: 12,
    }}>
      {[1.4, 1.2, 1.0].map((scale, i) => (
        <div key={i} style={{
          position: "absolute",
          width: 160 * scale, height: 160 * scale,
          borderRadius: "50%",
          border: `1px solid rgba(0,196,106,${0.06 + i * 0.04})`,
          animation: `pulse ${2 + i * 0.4}s ease-in-out infinite`,
          animationDelay: `${i * 0.3}s`,
        }} />
      ))}
      <div style={{
        width: 80, height: 80, borderRadius: 24,
        background: `linear-gradient(135deg, #014421, #00C46A)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 38, fontWeight: 900, color: C.white,
        boxShadow: `0 0 40px rgba(0,196,106,0.4)`,
        opacity: show ? 1 : 0,
        transform: `scale(${show ? 1 : 0.8})`,
        transition: "all 0.6s cubic-bezier(0.34,1.56,0.64,1)",
      }}>B</div>
      <div style={{
        opacity: show ? 1 : 0,
        transform: `translateY(${show ? 0 : 12}px)`,
        transition: "all 0.6s ease 0.3s",
        textAlign: "center",
      }}>
        <div style={{ fontSize: 26, fontWeight: 800, color: C.white, letterSpacing: 2 }}>BÉRYL</div>
        <div style={{ fontSize: 11, color: C.accent, letterSpacing: 3, marginTop: 4 }}>APP</div>
        <div style={{ fontSize: 9.5, color: C.gray, marginTop: 8, letterSpacing: 0.5 }}>Super-App intelligente africaine</div>
      </div>
      <div style={{
        position: "absolute", bottom: 80, left: 40, right: 40,
        height: 2, background: C.surfaceHi, borderRadius: 1, overflow: "hidden",
      }}>
        <div style={{
          height: "100%", background: C.accent, borderRadius: 1,
          animation: "loadBar 1.8s ease forwards",
          animationDelay: "0.5s",
          width: 0,
        }} />
      </div>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.03)} }
        @keyframes loadBar { to{width:100%} }
      `}</style>
    </div>
  );
}

function HomeScreen({ onNav }) {
  return (
    <div style={{ position: "absolute", inset: 0, background: C.obsidian, overflowY: "auto", paddingTop: 40 }}>
      <div style={{ padding: "16px 20px 8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 11, color: C.gray }}>Bonjour 👋</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: C.white }}>Tiémoko</div>
        </div>
        <div style={{
          width: 40, height: 40, borderRadius: 20,
          background: `linear-gradient(135deg, #014421, #00C46A)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 16, fontWeight: 700, color: C.white,
        }}>T</div>
      </div>
      <div style={{
        margin: "8px 16px",
        background: `linear-gradient(135deg, #014421 0%, #012D16 60%, #011A0D 100%)`,
        borderRadius: 20, padding: "20px 22px",
        border: `1px solid rgba(0,196,106,0.2)`,
        position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -20, right: -20, width: 100, height: 100, borderRadius: "50%", background: "rgba(0,196,106,0.06)" }} />
        <div style={{ fontSize: 10, color: C.gray, letterSpacing: 1, marginBottom: 4 }}>SOLDE BÉRYLPAY</div>
        <div style={{ fontSize: 30, fontWeight: 800, color: C.white }}>125 430 <span style={{ fontSize: 14, color: C.accent }}>FCFA</span></div>
        <div style={{ fontSize: 10, color: C.gray, marginTop: 6 }}>≈ 191 € · Score KYC ✓ Niveau 2</div>
        <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
          {["Envoyer", "Recharger", "QR Pay"].map((btn, i) => (
            <button key={i} onClick={() => onNav("pay")} style={{
              flex: 1, padding: "8px 0", borderRadius: 10,
              background: i === 0 ? C.accent : "rgba(255,255,255,0.08)",
              border: "none", color: i === 0 ? C.obsidian : C.white,
              fontSize: 11, fontWeight: 700, cursor: "pointer",
            }}>{btn}</button>
          ))}
        </div>
      </div>
      <div style={{ padding: "12px 16px 6px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.gray, letterSpacing: 1, marginBottom: 10 }}>ACCÈS RAPIDE</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {[
            { icon: "💬", label: "BérylCommunity", sub: "12 messages", color: "#00C46A", screen: "community" },
            { icon: "⚡", label: "Réserver un VE", sub: "15 VE disponibles", color: "#D4AF37", screen: "mobility" },
            { icon: "🌿", label: "Mon Score ESG", sub: "Score : 847 pts", color: "#5B9E74", screen: "esg" },
            { icon: "📊", label: "Transactions", sub: "Voir l'historique", color: "#7B68EE", screen: "pay" },
          ].map((item, i) => (
            <button key={i} onClick={() => onNav(item.screen)} style={{
              background: C.surface, border: `1px solid ${C.surfaceHi}`,
              borderRadius: 14, padding: "14px 12px",
              display: "flex", flexDirection: "column", gap: 6,
              cursor: "pointer", textAlign: "left",
            }}>
              <span style={{ fontSize: 22 }}>{item.icon}</span>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.white }}>{item.label}</div>
              <div style={{ fontSize: 10, color: item.color }}>{item.sub}</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{ padding: "12px 16px 80px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.gray, letterSpacing: 1, marginBottom: 10 }}>RÉCENT</div>
        {[
          { name: "Koné Ibrahim", type: "Transfert reçu", amount: "+12 500", color: C.accent, icon: "↓" },
          { name: "Course Béryl VE", type: "Mobilité électrique", amount: "−2 500", color: C.gray, icon: "⚡" },
          { name: "Tontine Famille", type: "Épargne collective", amount: "−5 000", color: C.gold, icon: "↑" },
        ].map((tx, i) => (
          <div key={i} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "10px 0", borderBottom: `1px solid ${C.surfaceHi}`,
          }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ width: 36, height: 36, borderRadius: 18, background: C.surfaceHi, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>{tx.icon}</div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.white }}>{tx.name}</div>
                <div style={{ fontSize: 10, color: C.gray }}>{tx.type}</div>
              </div>
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: tx.color }}>{tx.amount} <span style={{ fontSize: 9, color: C.gray }}>FCFA</span></div>
          </div>
        ))}
      </div>
      <NavBar active="home" onNav={onNav} />
    </div>
  );
}

  ];
  return (
    <div style={{ position: "absolute", inset: 0, background: C.obsidian, paddingTop: 40 }}>

        <div style={{ fontSize: 20, fontWeight: 800, color: C.white }}>BérylCommunity</div>
        <div style={{ display: "flex", gap: 12 }}>
          <span style={{ fontSize: 18, cursor: "pointer" }}>🔍</span>
          <span style={{ fontSize: 18, cursor: "pointer" }}>✏️</span>
        </div>
      </div>
      <div style={{ padding: "8px 16px", display: "flex", gap: 12, overflowX: "auto" }}>
        {["Ma Story", "Adama", "Marie", "Ibrahim", "Béryl"].map((s, i) => (
          <div key={i} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
            <div style={{
              width: 52, height: 52, borderRadius: 26,
              background: i === 0 ? C.surfaceHi : `linear-gradient(135deg, ${C.accent}, ${C.emerald})`,
              border: i === 0 ? `2px dashed ${C.gray}` : "none",
              display: "flex", alignItems: "center", justifyContent: "center",

            }}>{i === 0 ? "+" : s[0]}</div>

          </div>
        ))}
      </div>
      <div style={{ padding: "4px 0 72px", overflowY: "auto", height: "calc(100% - 200px)" }}>

            borderBottom: `1px solid ${C.surfaceHi}`,
          }}>
            <div style={{
              width: 46, height: 46, borderRadius: 23, flexShrink: 0,
              background: `linear-gradient(135deg, #014421, #00C46A)`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 700, color: C.white,
            }}>{c.avatar}</div>
            <div style={{ flex: 1, textAlign: "left" }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.white }}>{c.name}</span>
                <span style={{ fontSize: 10, color: C.gray }}>{c.time}</span>
              </div>
              <div style={{ fontSize: 11, color: C.gray, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 180 }}>{c.msg}</div>
            </div>
            {c.unread > 0 && (
              <div style={{ width: 20, height: 20, borderRadius: 10, background: C.accent, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: C.obsidian }}>{c.unread}</div>

    <div style={{ position: "absolute", inset: 0, background: C.obsidian, paddingTop: 36 }}>

        <button onClick={() => onNav("community")} style={{ background: "none", border: "none", cursor: "pointer", color: C.accent, fontSize: 18 }}>←</button>
        <div style={{ width: 36, height: 36, borderRadius: 18, background: `linear-gradient(135deg, #014421, #00C46A)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: C.white }}>AT</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.white }}>Adama Traoré</div>
          <div style={{ fontSize: 10, color: C.accent }}>● en ligne</div>
        </div>
        <span style={{ fontSize: 16, cursor: "pointer" }}>📞</span>
      </div>
      <div style={{ padding: "12px 12px 70px", overflowY: "auto", height: "calc(100% - 130px)", display: "flex", flexDirection: "column", gap: 8 }}>
        {messages.map((msg, i) => (
          <div key={i} style={{ display: "flex", justifyContent: msg.from === "me" ? "flex-end" : "flex-start" }}>
            {msg.type === "pay-bubble" ? (
              <div style={{ background: `linear-gradient(135deg, #014421, #012D16)`, border: `1px solid rgba(0,196,106,0.4)`, borderRadius: msg.from === "me" ? "16px 4px 16px 16px" : "4px 16px 16px 16px", padding: "10px 14px", maxWidth: 220 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, marginBottom: 4 }}>{msg.text}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: C.white }}>{msg.amount}</div>
                <div style={{ fontSize: 9.5, color: C.gray, marginTop: 4 }}>{msg.sub}</div>
                <div style={{ fontSize: 9, color: C.gray, marginTop: 6, textAlign: "right" }}>{msg.time}</div>
              </div>
            ) : msg.type === "mobility-bubble" ? (
              <div style={{ background: `linear-gradient(135deg, #1A1000, #2D1E00)`, border: `1px solid rgba(212,175,55,0.4)`, borderRadius: msg.from === "me" ? "16px 4px 16px 16px" : "4px 16px 16px 16px", padding: "10px 14px", maxWidth: 220 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 4 }}>{msg.text}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.white }}>{msg.amount}</div>
                <div style={{ fontSize: 9.5, color: C.gray, marginTop: 4 }}>{msg.sub}</div>
                <div style={{ fontSize: 9, color: C.gray, marginTop: 6, textAlign: "right" }}>{msg.time}</div>

              <div style={{ background: msg.from === "me" ? C.emerald : C.surface, borderRadius: msg.from === "me" ? "16px 4px 16px 16px" : "4px 16px 16px 16px", padding: "8px 12px", maxWidth: 220 }}>

      </div>

function App() {
  const [screen, setScreen] = useState("splash");
  const [isDemo, setIsDemo] = useState(false);
  const [demoStep, setDemoStep] = useState(0);
  const [demoProgress, setDemoProgress] = useState(0);
  const timerRef = useRef(null);
  const totalDemo = DEMO_STEPS.reduce((a, b) => a + b.duration, 0);

  const runDemo = () => {
    setIsDemo(true);
    setDemoStep(0);
    setDemoProgress(0);
    setScreen(DEMO_STEPS[0].screen);
  };

  useEffect(() => {
    if (!isDemo) return;
    const step = DEMO_STEPS[demoStep];
    if (!step) { setIsDemo(false); return; }
    setScreen(step.screen);
    const startElapsed = DEMO_STEPS.slice(0, demoStep).reduce((a, b) => a + b.duration, 0);
    let elapsed = 0;
    const interval = setInterval(() => {
      elapsed += 50;
      setDemoProgress(Math.min(100, ((startElapsed + elapsed) / totalDemo) * 100));
    }, 50);
    timerRef.current = setTimeout(() => {
      clearInterval(interval);
      const next = demoStep + 1;
      if (next < DEMO_STEPS.length) setDemoStep(next);
      else { setIsDemo(false); setDemoProgress(0); }
    }, step.duration);
    return () => { clearTimeout(timerRef.current); clearInterval(interval); };
  }, [isDemo, demoStep]);

  const renderScreen = () => {
    switch (screen) {
      case "splash":    return <SplashScreen />;
      case "home":      return <HomeScreen onNav={setScreen} />;
      case "community": return <CommunityScreen onNav={setScreen} />;
      case "chat":      return <ChatScreen onNav={setScreen} />;
      case "pay":       return <PayScreen onNav={setScreen} />;
      case "mobility":  return <MobilityScreen onNav={setScreen} />;
      case "esg":       return <ESGScreen onNav={setScreen} />;
      default:          return <HomeScreen onNav={setScreen} />;
    }
  };

  return (
    <div style={{
      width: "100vw", height: "100vh",
      background: `radial-gradient(ellipse at 30% 20%, rgba(1,68,33,0.15) 0%, #050708 60%)`,
      display: "flex", flexDirection: "column", alignItems: "center",
      justifyContent: "center", padding: "16px",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
      overflow: "hidden",
    }}>
      <div style={{ width: "100%", maxWidth: 360, height: "100%", maxHeight: 640, display: "flex", flexDirection: "column", gap: 12 }}>
        <PhoneFrame screen={screen}>
          {renderScreen()}
        </PhoneFrame>

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {isDemo && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 10, color: "#00C46A", fontWeight: 700 }}>🔴 {DEMO_STEPS[Math.min(demoStep, DEMO_STEPS.length-1)]?.screen.toUpperCase()}</span>
                <span style={{ fontSize: 10, color: "#8A9A8F" }}>{Math.round(demoProgress)}%</span>
              </div>
              <div style={{ height: 3, background: "#1A2820", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", background: "#00C46A", borderRadius: 2, width: `${demoProgress}%`, transition: "width 0.1s linear" }} />
              </div>
            </div>
          )}
          <button onClick={runDemo} style={{
            width: "100%", height: 42, borderRadius: 12,
            background: isDemo ? "rgba(0,196,106,0.1)" : "linear-gradient(135deg, #014421, #00C46A)",
            border: isDemo ? `1px solid #00C46A` : "none",
            color: isDemo ? "#00C46A" : "#0A0A0F",
            fontSize: 12, fontWeight: 800, cursor: "pointer", letterSpacing: 0.5,
          }}>
            {isDemo ? "⏺ DÉMO EN COURS" : "▶  LANCER LA DÉMO AUTOMATIQUE (≈20s)"}
          </button>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6 }}>
            {[{ id:"home",label:"Home"},{id:"community",label:"Chat"},{id:"pay",label:"Pay"},{id:"mobility",label:"VE"}].map(btn => (
              <button key={btn.id} onClick={() => { setIsDemo(false); setScreen(btn.id); }} style={{
                height: 30, borderRadius: 8,
                background: screen === btn.id ? "rgba(0,196,106,0.15)" : "#111816",
                border: `1px solid ${screen === btn.id ? "#00C46A" : "#1A2820"}`,
                color: screen === btn.id ? "#00C46A" : "#8A9A8F",
                fontSize: 10, fontWeight: 600, cursor: "pointer",
              }}>{btn.label}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
