function App() {
  const [screen, setScreen] = useState("splash");
  const [isDemo, setIsDemo] = useState(false);
  const demoRef = useRef(null);

  function runDemo() {
    setIsDemo(true);
    let i = 0;
    function next() {
      if (i >= DEMO_SEQ.length) { setIsDemo(false); return; }
      setScreen(DEMO_SEQ[i].screen);
      demoRef.current = setTimeout(() => { i++; next(); },
        DEMO_SEQ[i].duration);
    }
    next();
  }

  useEffect(() => {
    return () => { if (demoRef.current) clearTimeout(demoRef.current); };
  }, []);

  function renderScreen() {
    switch(screen) {
      case "splash":     return <SplashScreen/>;
      case "home":       return <HomeScreen/>;
      case "community":  return <CommunityScreen/>;
      case "chat":       return <ChatScreen/>;
      case "pay":        return <PayScreen/>;
      case "mobility":   return <MobilityScreen/>;
      case "esg":        return <ESGScreen/>;
      default:           return <HomeScreen/>;
    }
  }

  return (
    <div style={{
      width:"100vw",height:"100vh",
      background:C.obsidian,
      display:"flex",flexDirection:"column"
    }}>
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {renderScreen()}
      </div>
      <div style={{
        background:"#0A120D",
        borderTop:`1px solid ${C.surfaceHi}`,
        padding:"8px 10px",
        display:"flex",flexDirection:"column",gap:6
      }}>
        <button onClick={runDemo} disabled={isDemo} style={{
          width:"100%",padding:"8px",borderRadius:8,
          background:isDemo?"transparent"
            :`linear-gradient(135deg,${C.emerald},${C.accent})`,
          border:isDemo?`1px solid ${C.accent}`:"none",
          color:isDemo?C.accent:C.obsidian,
          fontSize:11,fontWeight:800,cursor:"pointer",
          letterSpacing:1
        }}>
          {isDemo?"⏺ DÉMO EN COURS":"▶ LANCER LA DÉMO AUTO (≈20s)"}
        </button>
        <div style={{
          display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4
        }}>
          {[
            {id:"home",label:"Home"},
            {id:"community",label:"Chat"},
            {id:"pay",label:"Pay"},
            {id:"mobility",label:"VE"},
          ].map(b=>(
            <button key={b.id}
              onClick={()=>{setIsDemo(false);setScreen(b.id);}}
              style={{
                height:28,borderRadius:6,
                background:screen===b.id
                  ?"rgba(0,196,106,0.15)":"#111816",
                border:`1px solid ${screen===b.id?C.accent:"#1A2820"}`,
                color:screen===b.id?C.accent:"#8A9A8F",
                fontSize:10,fontWeight:600,cursor:"pointer"
              }}>{b.label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
